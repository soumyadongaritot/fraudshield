<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FraudShield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width: 360px;
      min-height: 500px;
      background: #0a0e1a;
      color: #e0e6f0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      overflow-x: hidden;
    }

    #app { width: 100%; }

    /* ── Auth Screen ── */
    .auth-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 24px 20px;
      min-height: 500px;
    }

    .auth-logo {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .auth-logo .fraud  { color: #00d4aa; }
    .auth-logo .shield { color: #ffffff; }
    .auth-logo .version {
      font-size: 11px;
      background: #1a2035;
      color: #00d4aa;
      border: 1px solid #00d4aa40;
      border-radius: 20px;
      padding: 2px 8px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .auth-subtitle {
      color: #6b7d99;
      font-size: 11px;
      margin-bottom: 24px;
    }

    .auth-tabs {
      display: flex;
      background: #111827;
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 20px;
      width: 100%;
    }

    .auth-tab {
      flex: 1;
      padding: 8px;
      background: transparent;
      border: none;
      color: #6b7d99;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: #1a2540;
      color: #00d4aa;
      font-weight: 600;
    }

    .auth-form { width: 100%; }

    .auth-input {
      width: 100%;
      padding: 11px 14px;
      background: #111827;
      border: 1px solid #1e2d45;
      border-radius: 8px;
      color: #e0e6f0;
      font-family: inherit;
      font-size: 12px;
      margin-bottom: 10px;
      outline: none;
      transition: border 0.2s;
    }

    .auth-input:focus { border-color: #00d4aa; }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00d4aa, #0099cc);
      border: none;
      border-radius: 8px;
      color: #000;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }

    .auth-btn:hover   { opacity: 0.9; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      margin-bottom: 8px;
      background: #ff3d5a15;
      border: 1px solid #ff3d5a30;
    }

    .auth-footer {
      margin-top: auto;
      padding-top: 20px;
      color: #3a4a5c;
      font-size: 10px;
    }

    /* ── Main App Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px 8px;
      border-bottom: 1px solid #1a2035;
    }

    .logo { font-size: 16px; font-weight: 700; }
    .logo .fraud  { color: #00d4aa; }
    .logo .shield { color: #fff; }
    .logo .badge {
      font-size: 10px;
      background: #1a2035;
      color: #00d4aa;
      border: 1px solid #00d4aa40;
      border-radius: 20px;
      padding: 2px 7px;
      margin-left: 5px;
    }

    /* ── User bar ── */
    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: #0d1525;
      border-bottom: 1px solid #1a2035;
    }
    .user-email { color: #00d4aa; font-size: 11px; }
    .signout-btn {
      background: #ff3d5a20;
      border: 1px solid #ff3d5a40;
      border-radius: 5px;
      color: #ff3d5a;
      font-family: inherit;
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
    }

    /* ── URL bar ── */
    .url-bar {
      padding: 8px 14px;
      color: #6b7d99;
      font-size: 10px;
      border-bottom: 1px solid #0d1525;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Content ── */
    #content { padding: 10px 14px; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 30px 0;
      color: #00d4aa;
      font-size: 12px;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #1a2035;
      border-top-color: #00d4aa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #ff3d5a10;
      border: 1px solid #ff3d5a30;
      border-radius: 8px;
      padding: 14px;
      color: #ff3d5a;
      text-align: center;
      white-space: pre-line;
      line-height: 1.6;
    }

    /* ── Score row ── */
    .score-row {
      display: flex;
      gap: 14px;
      align-items: center;
      background: #0d1525;
      border: 1px solid #1a2035;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .score-ring { position: relative; flex-shrink: 0; }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring .track { fill: none; stroke: #1a2035; stroke-width: 5; }
    .score-ring .fill  {
      fill: none;
      stroke-width: 5;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s ease;
    }

    .score-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .score-num { font-size: 20px; font-weight: 700; line-height: 1; }
    .score-den { font-size: 9px; color: #3a4a5c; }

    .score-info { flex: 1; min-width: 0; }
    .status-tag  { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
    .risk-tag    { font-size: 9px; padding: 2px 7px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
    .status-desc { font-size: 10px; color: #8899aa; margin-bottom: 5px; line-height: 1.4; }
    .category-pill { font-size: 10px; padding: 3px 10px; border-radius: 20px; }

    /* ── Info grid ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .info-card, .info-card-full {
      background: #0d1525;
      border: 1px solid #1a2035;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .info-card-full { margin-bottom: 8px; }

    .info-label { font-size: 9px; color: #3a4a5c; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .info-value { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .info-sub   { font-size: 9px; color: #6b7d99; }

    .proto-https { color: #00ff88; }
    .proto-http  { color: #ff8800; }

    .trust-badge {
      display: inline-block;
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .trust-established { background: #00ff8815; color: #00ff88; border: 1px solid #00ff8830; }
    .trust-new         { background: #ffd60015; color: #ffd600; border: 1px solid #ffd60030; }
    .trust-bad         { background: #ff3d5a15; color: #ff3d5a; border: 1px solid #ff3d5a30; }
    .trust-unknown     { background: #6b7d9915; color: #6b7d99; border: 1px solid #6b7d9930; }

    /* ── Flags ── */
    .flags-section {
      background: #0d1525;
      border: 1px solid #1a2035;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }

    .section-title { font-size: 10px; color: #3a4a5c; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
    .flag-item { font-size: 11px; padding: 4px 0; border-bottom: 1px solid #0a0e1a; line-height: 1.4; }
    .flag-item:last-child { border-bottom: none; }

    /* ── Scan time bar ── */
    .scan-time-bar {
      padding: 6px 14px;
      color: #3a4a5c;
      font-size: 9px;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #0d1525;
    }

    /* ── Scan button ── */
    .action-bar { padding: 0 14px 8px; }
    .scan-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #0d2035, #0d2535);
      border: 1px solid #00d4aa40;
      border-radius: 8px;
      color: #00d4aa;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .scan-btn:hover    { background: linear-gradient(135deg, #0d2540, #0d3045); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── History table section ── */
    .history-table-section {
      margin: 0 14px 8px;
      background: #0d1525;
      border: 1px solid #1a2035;
      border-radius: 8px;
      overflow: hidden;
    }

    .htable-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid #1a2035;
    }

    .htable-title {
      font-size: 10px;
      color: #3a4a5c;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .htable-count {
      font-size: 9px;
      color: #00d4aa;
    }

    .htable-empty {
      padding: 14px 10px;
      font-size: 10px;
      color: #3a4a5c;
      text-align: center;
    }

    .htable-wrap {
      max-height: 160px;
      overflow-y: auto;
    }

    .htable {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
    }

    .htable thead th {
      padding: 5px 8px;
      color: #3a4a5c;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border-bottom: 1px solid #1a2035;
      text-align: left;
      background: #080c18;
    }

    .htable-row td {
      padding: 6px 8px;
      border-bottom: 1px solid #0a0e1a;
      vertical-align: middle;
    }

    .htable-row:last-child td { border-bottom: none; }
    .htable-row:hover td { background: #111827; }

    .htable-score {
      font-weight: 700;
      font-size: 11px;
      min-width: 28px;
    }

    .htable-domain {
      color: #8899aa;
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .htable-badge {
      font-size: 8px;
      padding: 2px 5px;
      border-radius: 3px;
      border: 1px solid;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .htable-time {
      color: #3a4a5c;
      font-size: 9px;
      white-space: nowrap;
    }

    /* ── Export bar ── */
    .export-bar { display: flex; gap: 8px; padding: 0 14px 12px; }
    .export-btn {
      flex: 1;
      padding: 8px;
      background: #0d1525;
      border: 1px solid #1e2d45;
      border-radius: 7px;
      color: #6b7d99;
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .export-btn:hover { border-color: #00d4aa; color: #00d4aa; }

    /* scrollbar */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #1a2035; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:200px;color:#3a4a5c;">
      Loading...
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
