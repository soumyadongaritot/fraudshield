<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>FraudShield</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#080b12; --bg2:#0d1117; --border:#1e2d3d;
      --cyan:#00e5ff; --orange:#ff6b2b; --green:#00ff88;
      --yellow:#ffd600; --red:#ff3d5a; --text:#cdd6e8; --muted:#4a5568;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:380px; background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; overflow:hidden; }
    .header { background:linear-gradient(135deg,#0d1b2a,#0a1628); padding:14px 18px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); }
    .logo { font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:var(--cyan); }
    .logo span { color:var(--orange); }
    .badge { background:#00e5ff12; color:var(--cyan); font-size:9px; font-family:'JetBrains Mono',monospace; padding:3px 8px; border-radius:20px; border:1px solid #00e5ff30; letter-spacing:1px; }
    .history-link { margin-left:auto; background:#00e5ff15; color:var(--cyan); border:1px solid #00e5ff30; font-family:'JetBrains Mono',monospace; font-size:9px; padding:4px 10px; border-radius:6px; cursor:pointer; text-decoration:none; }
    .history-link:hover { background:#00e5ff25; }
    .url-bar { background:var(--bg2); border-bottom:1px solid var(--border); padding:8px 16px; display:flex; align-items:center; gap:8px; }
    .url-text { font-size:10px; font-family:'JetBrains Mono',monospace; color:#6b7d99; word-break:break-all; flex:1; line-height:1.4; }
    .main { padding:14px; }
    .score-row { display:flex; align-items:center; gap:14px; margin-bottom:12px; background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:14px; }
    .score-ring { position:relative; width:84px; height:84px; flex-shrink:0; }
    .score-ring svg { transform:rotate(-90deg); }
    .track { fill:none; stroke:#1e2d3d; stroke-width:7; }
    .fill { fill:none; stroke-width:7; stroke-linecap:round; transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1),stroke 0.5s ease; }
    .score-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
    .score-num { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; line-height:1; }
    .score-den { font-size:8px; color:var(--muted); margin-top:1px; }
    .score-info { flex:1; min-width:0; }
    .status-tag { font-size:14px; font-weight:700; margin-bottom:3px; }
    .risk-tag { font-size:9px; font-family:'JetBrains Mono',monospace; padding:2px 8px; border-radius:4px; margin-bottom:5px; display:inline-block; }
    .status-desc { font-size:11px; color:#6b7d99; line-height:1.4; margin-bottom:5px; }
    .category-pill { display:inline-block; font-size:9px; font-family:'JetBrains Mono',monospace; padding:2px 8px; border-radius:20px; }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:7px; }
    .info-card { background:var(--bg2); border:1px solid var(--border); border-radius:9px; padding:9px; }
    .info-label { font-size:8px; font-family:'JetBrains Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
    .info-value { font-size:11px; font-weight:600; color:var(--text); line-height:1.3; }
    .info-sub { font-size:9px; color:var(--muted); margin-top:2px; }
    .info-card-full { background:var(--bg2); border:1px solid var(--border); border-radius:9px; padding:9px; margin-bottom:7px; }
    .flags-section { background:var(--bg2); border:1px solid var(--border); border-radius:9px; padding:10px; margin-bottom:12px; }
    .section-title { font-size:8px; font-family:'JetBrains Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
    .flag-item { font-size:11px; padding:4px 0; color:#8899aa; border-bottom:1px solid #0d1117; line-height:1.4; }
    .flag-item:last-child { border-bottom:none; }
    .trust-badge { display:inline-flex; align-items:center; gap:4px; font-size:9px; padding:2px 7px; border-radius:4px; font-family:'JetBrains Mono',monospace; margin-top:4px; }
    .trust-established { background:#00ff8815; color:#00ff88; border:1px solid #00ff8830; }
    .trust-new { background:#ffd60015; color:#ffd600; border:1px solid #ffd60030; }
    .trust-unknown { background:#ffffff08; color:#6b7d99; border:1px solid #1e2d3d; }
    .trust-bad { background:#ff3d5a15; color:#ff3d5a; border:1px solid #ff3d5a30; }
    .proto-https { color:var(--green); }
    .proto-http { color:var(--red); }
    .scan-btn { width:100%; background:linear-gradient(135deg,#00e5ff15,#0066ff15); border:1px solid #00e5ff30; color:var(--cyan); font-family:'JetBrains Mono',monospace; font-size:11px; padding:10px; border-radius:8px; cursor:pointer; transition:all 0.2s; margin-bottom:8px; }
    .scan-btn:hover { background:linear-gradient(135deg,#00e5ff25,#0066ff25); }
    .scan-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .export-row { display:flex; gap:7px; margin-bottom:4px; }
    .export-btn { flex:1; background:#ffffff08; border:1px solid var(--border); color:#6b7d99; font-family:'JetBrains Mono',monospace; font-size:9px; padding:7px; border-radius:7px; cursor:pointer; transition:all 0.2s; letter-spacing:0.5px; }
    .export-btn:hover { background:#ffffff12; color:var(--text); border-color:#2e3d4d; }
    .loading { text-align:center; padding:30px 0; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:11px; }
    .spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--cyan); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-msg { text-align:center; padding:20px; color:var(--red); font-size:11px; font-family:'JetBrains Mono',monospace; line-height:1.8; white-space:pre-line; }
    .footer { padding:8px 16px; border-top:1px solid var(--border); font-size:9px; color:var(--muted); font-family:'JetBrains Mono',monospace; display:flex; justify-content:space-between; background:var(--bg2); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Fraud<span>Shield</span></div>
    <div class="badge">v3.0 AI</div>
    <span class="history-link" id="historyBtn">📋 HISTORY</span>
  </div>
  <div class="url-bar">
    <div class="url-text" id="urlDisplay">Loading...</div>
  </div>
  <div class="main">
    <div id="content">
      <div class="loading"><div class="spinner"></div>Analyzing with AI...</div>
    </div>
    <button class="scan-btn" id="scanBtn">⟳ RE-SCAN THIS PAGE</button>
    <div class="export-row">
      <button class="export-btn" id="exportCSVBtn">⬇ EXPORT CSV</button>
      <button class="export-btn" id="exportPDFBtn">⬇ EXPORT PDF</button>
    </div>
  </div>
  <div class="footer">
    <span>FraudShield v3.0 — AI Fraud Detection</span>
    <span id="scanTime"></span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
